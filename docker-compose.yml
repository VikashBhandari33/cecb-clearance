services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: cecb_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     cecb
      POSTGRES_PASSWORD: cecb123
      POSTGRES_DB:       cecb_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: cecb_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  postgres_data:
